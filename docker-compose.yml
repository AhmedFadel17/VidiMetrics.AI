services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vidimetrics-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "timeout 1 bash -c '</dev/tcp/127.0.0.1/1433' || exit 1" ]
      interval: 8s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vidimetrics-net

  redis:
    image: redis:7-alpine
    container_name: vidimetrics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - vidimetrics-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vidimetrics-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vidimetrics-net

  vidimetrics-identity:
    build:
      context: .
      dockerfile: VidiMetrics.IdentityServer/Dockerfile
    container_name: vidimetrics-identity
    ports:
      - "5145:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=VidiMetricsIdentityServerDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - vidimetrics-net
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets/${IDENTITY_USER_SECRETS_ID}/secrets.json:ro

  vidimetrics-api:
    build:
      context: .
      dockerfile: VidiMetrics.API/Dockerfile
    container_name: vidimetrics-api
    ports:
      - "7264:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=VidiMetricsPass123!
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/home/app/.aspnet/https/VidiMetrics.API.pfx

      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=VidiMetricsDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__RedisConnection=vidimetrics-redis:6379
      - RabbitMQ__Host=rabbitmq

      - IdentityServerSettings__BaseUrl=${IdentityServerSettings__BaseUrl}
      - FrontendSettings__BaseUrl=${FrontendSettings__BaseUrl}

      - IdentityServerSettings__ClientSecret=${IdentityServerSettings__ClientSecret}
      - IdentityServerSettings__ClientId=${IdentityServerSettings__ClientId}

      - SubscriptionSettings__FreePlan__Id=${SubscriptionSettings__FreePlan__Id}
      - SubscriptionSettings__FreePlan__Name=${SubscriptionSettings__FreePlan__Name}
      - SubscriptionSettings__FreePlan__Description=${SubscriptionSettings__FreePlan__Description}
      - SubscriptionSettings__FreePlan__MonthlyPrice=${SubscriptionSettings__FreePlan__MonthlyPrice}
      - SubscriptionSettings__FreePlan__MaxChannelsAllowed=${SubscriptionSettings__FreePlan__MaxChannelsAllowed}
      - SubscriptionSettings__FreePlan__DailyApiQuotaLimit=${SubscriptionSettings__FreePlan__DailyApiQuotaLimit}
      - SubscriptionSettings__FreePlan__IsActive=${SubscriptionSettings__FreePlan__IsActive}

      - ApisSettings__Youtube__Name=${ApisSettings__Youtube__Name}
      - ApisSettings__Youtube__ClientId=${ApisSettings__Youtube__ClientId}
      - ApisSettings__Youtube__ClientSecret=${ApisSettings__Youtube__ClientSecret}
      - ApisSettings__Youtube__RedirectUri=${ApisSettings__Youtube__RedirectUri}
      - ApisSettings__Youtube__AuthUrl=${ApisSettings__Youtube__AuthUrl}
      - ApisSettings__Youtube__BaseUrl=${ApisSettings__Youtube__BaseUrl}

      - ApisSettings__Tiktok__Name=${ApisSettings__Tiktok__Name}
      - ApisSettings__Tiktok__ClientId=${ApisSettings__Tiktok__ClientId}
      - ApisSettings__Tiktok__ClientSecret=${ApisSettings__Tiktok__ClientSecret}
      - ApisSettings__Tiktok__RedirectUri=${ApisSettings__Tiktok__RedirectUri}
      - ApisSettings__Tiktok__BaseUrl=${ApisSettings__Tiktok__BaseUrl}
      - ApisSettings__Tiktok__AuthUrl=${ApisSettings__Tiktok__AuthUrl}

      - ApisSettings__Cloudinary__Name=${ApisSettings__Cloudinary__Name}
      - ApisSettings__Cloudinary__ApiKey=${ApisSettings__Cloudinary__ApiKey}
      - ApisSettings__Cloudinary__ClientSecret=${ApisSettings__Cloudinary__ClientSecret}

      - ApisSettings__Pollinations__Name=${ApisSettings__Pollinations__Name}
      - ApisSettings__Pollinations__ApiKey=${ApisSettings__Pollinations__ApiKey}
      - ApisSettings__Pollinations__BaseUrl=${ApisSettings__Pollinations__BaseUrl}
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets/${API_USER_SECRETS_ID}/secrets.json:ro
      - ${USERPROFILE}/.aspnet/https:/home/app/.aspnet/https:ro
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - vidimetrics-net

  vidimetrics-web:
    build:
      context: ./VidiMetrics.Web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_API_NGROK_URL=${VITE_API_NGROK_URL}
        - VITE_IDENTITY_SERVER_URL=${VITE_IDENTITY_SERVER_URL}
        - VITE_IDENTITY_CLIENT_ID=${VITE_IDENTITY_CLIENT_ID}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_TIKTOK_CLIENT_KEY=${VITE_TIKTOK_CLIENT_KEY}
    container_name: vidimetrics-web
    ports:
      - "5173:80"
    depends_on:
      - vidimetrics-api
    networks:
      - vidimetrics-net

volumes:
  sql-data:
  redis-data:
  rabbitmq-data:

networks:
  vidimetrics-net:
    driver: bridge
